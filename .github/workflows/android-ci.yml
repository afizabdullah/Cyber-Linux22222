name: Android CI/CD - Cyber Linux OS

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:
    branches:
      - main
      - develop
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: 34
  ANDROID_BUILD_TOOLS: 34.0.0
  GRADLE_VERSION: 8.2
  KOTLIN_VERSION: 1.9.20

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-${{ env.ANDROID_COMPILE_SDK }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
            extras;google;m2repository
            extras;android;m2repository
            system-images;android-${{ env.ANDROID_COMPILE_SDK }};google_apis;x86_64

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: |
            /usr/local/lib/android/sdk/platforms
            /usr/local/lib/android/sdk/build-tools
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_COMPILE_SDK }}

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          fi

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Run Lint
        run: ./gradlew lint --no-daemon

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Run Android Tests
        run: ./gradlew connectedAndroidTest --no-daemon --stacktrace

      - name: Build APK (Debug)
        if: github.event.inputs.build_type == 'debug' || github.ref == 'refs/heads/develop'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build APK (Release)
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            ./gradlew assembleRelease --no-daemon --stacktrace \
              -Pandroid.injected.signing.store.file=app/release.keystore \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            echo "⚠️ No keystore found, building unsigned release"
            ./gradlew assembleRelease --no-daemon --stacktrace
          fi

      - name: Build AAB (Release)
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            ./gradlew bundleRelease --no-daemon --stacktrace \
              -Pandroid.injected.signing.store.file=app/release.keystore \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          else
            echo "⚠️ No keystore found, building unsigned AAB"
            ./gradlew bundleRelease --no-daemon --stacktrace
          fi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Upload Release AAB
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/reports/androidTests/
          if-no-files-found: ignore

      - name: Upload Lint Reports
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: app/build/reports/lint-results*.html
          if-no-files-found: ignore

  create-release:
    name: Create GitHub Release
    needs: build-and-test
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download APK Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk/

      - name: Download AAB Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: aab/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apk/*.apk
            aab/*.aab
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-play-store:
    name: Deploy to Google Play Store
    needs: build-and-test
    if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: aab/

      - name: Deploy to Play Store (Internal Test)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
          packageName: com.cyberlinux.os
          releaseFiles: aab/*.aab
          track: internal
          status: draft
          releaseName: v${{ github.run_number }}
          releaseNotes:
            en-US: |
              Cyber Linux OS v${{ github.run_number }}
              - Bug fixes and performance improvements
              - New features added
              - Security updates
            ar: |
              سايبر لينكس أو إس v${{ github.run_number }}
              - إصلاح الأخطاء وتحسين الأداء
              - إضافة ميزات جديدة
              - تحديثات أمنية

  notify:
    name: Send Notifications
    needs: [build-and-test, create-release, deploy-play-store]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        if: ${{ success() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: '#builds'
          SLACK_COLOR: '#00FF00'
          SLACK_TITLE: '✅ Build Successful - Cyber Linux OS'
          SLACK_MESSAGE: 'Version: ${{ github.run_number }}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}'

      - name: Notify Slack (Failure)
        if: ${{ failure() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: '#builds'
          SLACK_COLOR: '#FF0000'
          SLACK_TITLE: '❌ Build Failed - Cyber Linux OS'
          SLACK_MESSAGE: 'Version: ${{ github.run_number }}\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}'

      - name: Notify Telegram
        if: ${{ success() }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ BUILD SUCCESSFUL - Cyber Linux OS
            Version: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            ⬇️ Download: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
